<title>POS Mobile Pro</title>

<script>




/* ================= PATCH FETCH ================= */

const originalFetch = window.fetch;

window.fetch = function(url, options = {}){

const token = localStorage.getItem("token")

options.headers = {
...(options.headers || {}),
Authorization: token
}

return originalFetch(url, options).then(res=>{

if(res.status === 401){

localStorage.removeItem("token")
location.href="/login.html"

}

return res

})

}

function showSuggestions(){

  const input = document.getElementById("searchProduct")
  if(!input) return

  const search = input.value.toLowerCase().trim()

  const box = document.getElementById("searchSuggestions")

  if(!search){
    box.style.display="none"
    box.innerHTML=""
    return
  }

  const results = state.products
  .filter(p => p.name.toLowerCase().includes(search))
  .slice(0,5)

  if(results.length === 0){
    box.style.display="none"
    box.innerHTML=""
    return
  }

  box.innerHTML=""

  results.forEach(p=>{

    const row = document.createElement("div")

    row.style.padding="8px 10px"
    row.style.cursor="pointer"
    row.style.display="flex"
    row.style.justifyContent="space-between"
    row.style.fontSize="13px"
    row.style.borderBottom="1px solid #f1f5f9"

    row.innerHTML = `
<span>${p.name}</span>
<b>$${p.price.toFixed(2)}</b>
`

    row.onclick = () => {

      // agregar producto
      addToCart(p.id,{classList:{add(){},remove(){}}})

      // limpiar buscador
      input.value=""

      // ocultar sugerencias
      box.style.display="none"
      box.innerHTML=""

      // volver foco al buscador
      input.focus()

    }

    box.appendChild(row)

  })

  box.style.display="block"

}

/* ================= API WRAPPER ================= */

function api(url, options = {}){

const token = localStorage.getItem("token")

options.headers = {
...(options.headers || {}),
Authorization: token,
"Content-Type": "application/json"
}

return fetch(url, options)

}

/* ================= VERIFICAR TOKEN ================= */

const token = localStorage.getItem("token")

if(!token){
location.href="/login.html"
}

/* validar sesión contra servidor */

fetch("/api/session",{
headers:{Authorization:token}
})
.then(res=>{

if(res.status!==200){
localStorage.removeItem("token")
location.href="/login.html"
}

})

/* ================= REVISIÓN AUTOMÁTICA ================= */

setInterval(()=>{

fetch("/api/session",{
headers:{Authorization:localStorage.getItem("token")}
})
.then(res=>{

if(res.status!==200){

localStorage.removeItem("token")

alert("Sesión expirada")

location.href="/login.html"

}

})

},60000)

</script>

</head>

    <span style="font-weight:700;font-size:14px;color:#0f172a;">
      💰 Ganancia por día
    </span>

    <canvas id="profitChart" style="margin-top:12px;width:100%;height:160px;"></canvas>
  </div>

  <!-- RANKING -->
  <div id="rankingList" class="card" style="margin-top:4px;"></div>

</section>

<script>

// =========== STATE ===========
const state = {
  products: [],
  cart: [],
  sales: []
}

const filters = {
  search: "",
  range: "today",
  customDate: null
}

let activeCategory = "Todos"
let editingId = null
let restockId = null
async function loadProducts(){

  const res = await fetch("/api/products")
  const data = await res.json()

  state.products = data.map(p => ({
    id: p.id,
    name: p.name,
    price: Number(p.price),
    cost: Number(p.cost || 0),
    stock: Number(p.stock),
    sold: Number(p.sold || 0),
    cat: p.cat || "General"
  }))

  await loadSales()

  renderAll()

}

async function backupPOS(){

const res = await fetch("/api/backup")
const data = await res.json()

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

// generar fecha y hora
const now = new Date()

const fecha =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + "_" +
String(now.getHours()).padStart(2,"0") + "-" +
String(now.getMinutes()).padStart(2,"0") + "-" +
String(now.getSeconds()).padStart(2,"0")

const a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "pos-backup_" + fecha + ".json"
a.click()

showToast("✅ Backup descargado")

}


async function restorePOS(file){

if(!file) return

const text = await file.text()
const data = JSON.parse(text)

await fetch("/api/restore",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

showToast("♻️ Backup restaurado")

setTimeout(()=>{
location.reload()
},1000)

}


async function loadSales(){

  try{

    const res = await fetch("/api/sales")
    const data = await res.json()

    state.sales = (data || []).map(s => {

      // 🔥 si ya tiene ISO, usarlo
      if(s.dateISO){
        return s
      }

      // 🔥 convertir fecha vieja a ISO
      if(s.date){

        const parts = s.date.split(",")[0].split("/")

        const day = parseInt(parts[0])
        const month = parseInt(parts[1]) - 1
        const year = parseInt(parts[2])

        return {
          ...s,
          dateISO: new Date(year, month, day).toISOString()
        }
      }

      // 🔥 si viene totalmente rota, descartar
      return null

    }).filter(Boolean)

  }catch{

    state.sales = []

  }

}


// =========== SIDEBAR ===========
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open")
  document.getElementById("overlay").classList.toggle("show")
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open")
  document.getElementById("overlay").classList.remove("show")
}

  document.querySelectorAll("section").forEach(s => s.classList.add("hidden"))
  document.getElementById(id).classList.remove("hidden")
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"))
  document.getElementById("nav-" + id)?.classList.add("active")

  if (id === "stats") {
    setTimeout(() => {
      drawChart()
      drawProfitChart()

  }
}
// =========== TOAST ===========
function showToast(msg) {
  const t = document.getElementById("toast")
  t.textContent = msg
  t.classList.add("show")
  setTimeout(() => t.classList.remove("show"), 2400)
}

// =========== CATEGORIES ===========
function getCategories() {
  const cats = [...new Set(state.products.map(p => p.cat || "General"))]
  return ["Todos", ...cats]
}
function renderCategoryFilter() {
  const container = document.getElementById("catFilter")
  container.innerHTML = ""
  getCategories().forEach(cat => {
    const btn = document.createElement("button")
    btn.className = "cat-btn" + (cat === activeCategory ? " active" : "")
    btn.textContent = cat
    btn.onclick = () => { activeCategory = cat; renderProducts() }
    container.appendChild(btn)
  })
}

// =========== PRODUCTS ===========
function renderProducts() {
  const search = document.getElementById("searchProduct").value.toLowerCase()
  const container = document.getElementById("productList")
  container.innerHTML = ""
  let lowStock = []

  const filtered = state.products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search)
    const matchCat = activeCategory === "Todos" || (p.cat || "General") === activeCategory
    return matchSearch && matchCat
  })

  if (filtered.length === 0) {
    container.innerHTML = `<div style="grid-column:span 2; text-align:center; color:#94a3b8; padding:24px; font-size:13px;">Sin productos</div>`
  }

  filtered.forEach(p => {
    if (p.stock <= 5) lowStock.push(`${p.name} (${p.stock})`)
    const card = document.createElement("div")
    card.className = "product-card"
    const oos = p.stock <= 0
    card.innerHTML = `
      <div style="font-weight:700; font-size:13px; margin-bottom:4px; color:#0f172a;">${p.name}</div>
      <span class="cat-chip">${p.cat || "General"}</span>
      <div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;">
        <b style="font-size:15px; font-family:'JetBrains Mono',monospace; color:#0f172a;">$${p.price.toFixed(2)}</b>
        <span class="${p.stock <= 5 && p.stock > 0 ? 'badge badge-red' : oos ? 'badge badge-red' : 'badge badge-green'}">${p.stock}</span>
      </div>
      <button onclick="addToCart(${p.id},this)" class="btn-add" ${oos ? 'disabled' : ''}>
        ${oos ? 'Sin stock' : '+ Agregar'}
      </button>
    `
    container.appendChild(card)
  })

  const alertBox = document.getElementById("lowStockAlert")
  alertBox.innerHTML = lowStock.length
    ? `<div class="alert-box">⚠ Stock bajo: ${lowStock.join(" · ")}</div>` : ""

  renderCategoryFilter()
}

// =========== CART ===========
function addToCart(id, btn) {

  btn.classList.add("pop")
  setTimeout(() => btn.classList.remove("pop"), 220)

  let p = state.products.find(x => x.id === id)

  if (p.stock <= 0) {
    showToast("⚠ Sin stock disponible")
    return
  }

  let item = state.cart.find(x => x.id === id)

  if (item) {
    item.qty++
  } 
  else {

    state.cart.push({
      id: p.id,
      name: p.name,
      price: p.price,
      cost: p.cost,   // 🔥 NUEVO
      qty: 1
    })

  }

  p.stock--

  renderAll()
}

function changeQty(id, delta) {
  let item = state.cart.find(x => x.id === id)
  if (!item) return
  let p = state.products.find(x => x.id === id)
  if (delta > 0) {
    if (p.stock <= 0) { showToast("⚠ Sin más stock"); return }
    p.stock--
    item.qty++
  } else {
    p.stock++
    item.qty--
    if (item.qty <= 0) state.cart = state.cart.filter(x => x.id !== id)
  }
  renderAll()
}

function renderCart() {
  const container = document.getElementById("cart")
  container.innerHTML = ""
  let total = 0

  if (state.cart.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px 0; font-size:13px;">El carrito está vacío</div>`
    document.getElementById("total").textContent = "$0.00"
    calculateChange()
    return
  }

  state.cart.forEach(item => {
    const sub = item.qty * item.price
    total += sub
    const row = document.createElement("div")
    row.className = "cart-row"
    row.innerHTML = `
      <div>
        <div style="font-size:14px; font-weight:600; color:#0f172a;">${item.name}</div>
        <div style="font-size:11px; color:#94a3b8; font-family:'JetBrains Mono',monospace;">$${item.price.toFixed(2)} × ${item.qty}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-display">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <span style="font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; min-width:56px; text-align:right; color:#0f172a;">$${sub.toFixed(2)}</span>
    `
    container.appendChild(row)
  })

  document.getElementById("total").textContent = `$${total.toFixed(2)}`
  calculateChange()
}

function calculateChange() {

  const paid = Number(document.getElementById("paid").value) || 0
  const total = parseFloat(
    document.getElementById("total").textContent.replace("$","")
  ) || 0

  const change = Math.max(paid - total, 0)

  // Mostrar vuelto
  document.getElementById("change").textContent = `$${change.toFixed(2)}`

  // Botón confirmar venta
  const btn = document.querySelector("#confirmSaleBtn")

  if (paid < total || total === 0) {
    btn.disabled = true
    btn.style.opacity = "0.5"
    btn.style.cursor = "not-allowed"
  } 
  else {
    btn.disabled = false
    btn.style.opacity = "1"
    btn.style.cursor = "pointer"
  }

}
async function confirmSale() {

  if (state.cart.length === 0) {
    showToast("⚠ El carrito está vacío")
    return
  }

  const total = parseFloat(
    document.getElementById("total").textContent.replace("$","")
  )

  const paid = Number(document.getElementById("paid").value) || 0

  if (paid < total) {
    showToast("❌ Pago insuficiente")
    return
  }

  const change = paid - total

  state.cart.forEach(item => {
    const p = state.products.find(x => x.id === item.id)
    p.sold += item.qty
  })

  const now = new Date()

const sale = {
  id: Date.now(),
  num: state.sales.length + 1,
  dateISO: new Date().toISOString(), // 🔥 BASE REAL
  date: new Date().toLocaleString(), // solo visual
  dateKey: now.getDate() + "/" + (now.getMonth()+1),
  items: JSON.parse(JSON.stringify(state.cart)),
  total,
  paid,
  change
}

  await fetch("/api/sales",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(sale)
  })

  // limpiar carrito
  state.cart = []
  document.getElementById("paid").value = ""

  // 🔥🔥 CLAVE: quitar foco antes del modal
  if (document.activeElement) {
    document.activeElement.blur()
  }

  // mostrar ticket
  showSaleSummary(sale)

  // actualizar productos sin bloquear interfaz
  setTimeout(loadProducts, 500)

  showToast(`✅ Venta #${sale.num}`)

  // ❌ YA NO ponemos focus aquí (esto era el bug)
}

// =========== INVENTORY ===========
function renderInventory() {

  const container = document.getElementById("inventoryList")
  container.innerHTML = ""

  const search = document.getElementById("searchInventory")?.value?.toLowerCase() || ""

  const filtered = state.products.filter(p =>
    p.name.toLowerCase().includes(search)
  )

  const best = [...state.products]
    .sort((a,b) => (b.sold*(b.price-b.cost)) - (a.sold*(a.price-a.cost)))[0]

  filtered.forEach(p => {

        </div>

        }
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:13px; color:#475569;">

        <div style="font-size:11px;color:#94a3b8;font-weight:600;">PRECIO VENTA</div>
        <div><b style="font-family:'JetBrains Mono',monospace;">$${p.price.toFixed(2)}</b></div>

        <div style="font-size:11px;color:#94a3b8;font-weight:600;">COSTO</div>
        <div><b style="font-family:'JetBrains Mono',monospace;">$${p.cost.toFixed(2)}</b></div>

        <div style="background:#f0fdf4; border-radius:8px; padding:8px;">
          <div style="font-size:11px;color:#16a34a;font-weight:600;">GANANCIA/U</div>
          <b style="font-family:'JetBrains Mono',monospace;color:#16a34a;">
            $${profit.toFixed(2)}
          </b>
        </div>

        <div style="background:#f0fdf4; border-radius:8px; padding:8px;">
          <div style="font-size:11px;color:#16a34a;font-weight:600;">GANANCIA TOTAL</div>
          <b style="font-family:'JetBrains Mono',monospace;color:#16a34a;">
            $${totalProfit.toFixed(2)}
          </b>
        </div>

        <div style="background:#f8fafc; border-radius:8px; padding:8px;">
          <div style="font-size:11px;color:#94a3b8;font-weight:600;">STOCK</div>
          <b style="font-family:'JetBrains Mono',monospace;color:${p.stock<=5?'#dc2626':'#0f172a'};">
            ${p.stock}
          </b>
        </div>

      </div>

      <div style="display:flex; gap:8px; margin-top:10px;">

        <button onclick="openEditModal(${p.id})"
        class="btn-ghost" style="flex:1;">
        ✏️ Editar
        </button>

        <button onclick="openRestock(${p.id})"
        class="btn-ghost"
        style="flex:1; border-color:#22c55e; color:#16a34a;">
        + Stock
        </button>

        <button onclick="deleteProduct(${p.id})"
        class="btn-danger">
        🗑
        </button>

      </div>
    `

    container.appendChild(card)

  })

}

function openEditModal(id){

    return
  }

  document.getElementById("modal-title").textContent = "✏️ Editar producto"

  document.getElementById("m-name").value = p.name
  document.getElementById("m-price").value = p.price

function closeModal(){

}


async function saveProduct(){

  const name = document.getElementById("m-name").value.trim()

  if(!name){
    showToast("⚠ Ingresá el nombre")
    return
  }

  const price = parseFloat(document.getElementById("m-price").value) || 0
  const cost  = parseFloat(document.getElementById("m-cost").value) || 0
  const stock = parseInt(document.getElementById("m-stock").value) || 0

  const cat = (
    document.getElementById("m-cat").value.trim()
      .toLowerCase()
      .replace(/^\w/, c => c.toUpperCase())
  ) || "General"

  const product = { name, price, cost, stock, cat }

  const url = editingId
    ? "/api/products/" + editingId
    : "/api/products"

  const method = editingId ? "PUT" : "POST"

  try{

    const res = await fetch(url,{
      method,
      headers:{
        "Content-Type":"application/json",
        "Authorization": localStorage.getItem("token")
      },
      body:JSON.stringify(product)
    })

    if(!res.ok){
      throw new Error("Error en servidor")
    }

    showToast(
      editingId
        ? "✏️ Producto actualizado"
        : "✅ Producto agregado"
    )

    closeModal()

    editingId = null

    await loadProducts()

  }catch(err){

    console.error(err)
    showToast("❌ Error guardando producto")

  }

}

// =========== SALES ===========

function setRange(type){
  filters.range = type
  filters.customDate = null
  document.getElementById("dateFilter").value = ""
  renderSales()
}



function getFilteredSales(){

  let sales = [...state.sales]

  // 🔎 BUSCADOR
  if(filters.search){
    sales = sales.filter(s => 
      s.items.some(p => 
        p.name.toLowerCase().includes(filters.search)
      )
    )
  }

  function toLocalDate(date){
    return new Date(
      date.getFullYear(),
      date.getMonth(),
      date.getDate()
    )
  }

  const today = toLocalDate(new Date())

  sales = sales.filter(s => {

    if(!s.dateISO) return false

    const saleDate = toLocalDate(new Date(s.dateISO))

    if(filters.customDate){
      const d = toLocalDate(new Date(filters.customDate))
      return saleDate.getTime() === d.getTime()
    }

if(filters.range === "today"){
  return (
    saleDate.getFullYear() === today.getFullYear() &&
    saleDate.getMonth() === today.getMonth() &&
    saleDate.getDate() === today.getDate()
  )
}


if(filters.range === "yesterday"){
  const y = new Date(today)
  y.setDate(y.getDate() - 1)

  return (
    saleDate.getFullYear() === y.getFullYear() &&
    saleDate.getMonth() === y.getMonth() &&
    saleDate.getDate() === y.getDate()
  )
}
    if(filters.range === "week"){
      const weekAgo = new Date(today)
      weekAgo.setDate(today.getDate() - 7)
      return saleDate >= weekAgo
    }

    return true
  })

  return sales
}

function renderSales(){

  const container = document.getElementById("salesList")
  container.innerHTML = ""

  const filtered = getFilteredSales()

  if(filtered.length === 0){
    container.innerHTML = `
    <div style="text-align:center;color:#94a3b8;padding:40px 0;">
    No hay resultados con ese filtro
    </div>`
    return
  }

  // 🔥 ordenar
  const ordenadas = [...state.sales]
    .sort((a,b)=> new Date(a.dateISO) - new Date(b.dateISO))

  // 🔥 acumulado
  let acumulado = 0

  const conAcumulado = ordenadas.map(s=>{
    acumulado += s.total
    return {
      ...s,
      acumulado
    }
  })

  // 🔥 filtrar
  const ids = new Set(filtered.map(f=>f.id))
  const ventas = conAcumulado.filter(s => ids.has(s.id))

  // 🔥 render
  ventas.reverse().forEach(s=>{

    const items = s.items.map(p=>{
      const unitProfit = (p.price - p.cost)
      const totalProfit = unitProfit * p.qty

      return `
      ${p.name} x${p.qty} — Gan: $${totalProfit.toFixed(2)}
      <br>Valor unitario: <b>$${p.price.toFixed(2)} c/u</b>
      <br>Ganancia unidad: 
      <b style="color:#16a34a;">$${unitProfit.toFixed(2)}</b>
      <br><br>
      `
    }).join("")

    const profitVenta = s.items.reduce((a,p)=>{
      return a + ((p.price - p.cost) * p.qty)
    },0)

// =========== CHART ===========
function drawChart() {

  const canvas = document.getElementById("salesChart")
  if (!canvas) return

  const ctx = canvas.getContext("2d")

  const W = canvas.offsetWidth || 300
  canvas.width = W
  canvas.height = 160

  const H = 160

  const byDay = {}

  // agrupar ventas por día
  state.sales.forEach(s => {

    if(!s.dateKey) return

    // limpiar fecha (si viene con año o hora)
    const clean = s.dateKey.split("/").slice(0,2).join("/")

    byDay[clean] = (byDay[clean] || 0) + s.total

  })

  // ordenar fechas correctamente
  const labels = Object.keys(byDay)
    .sort((a,b)=>{
      const [d1,m1] = a.split("/").map(Number)
      const [d2,m2] = b.split("/").map(Number)
      return new Date(2026,m1-1,d1) - new Date(2026,m2-1,d2)
    })
    .slice(-7)

  const values = labels.map(k => byDay[k])

  ctx.clearRect(0,0,W,H)

  if(labels.length === 0){

    ctx.fillStyle = "#94a3b8"
    ctx.font = "13px Sora, sans-serif"
    ctx.textAlign = "center"

    ctx.fillText("Aún no hay datos para graficar",W/2,H/2)

    return
  }

  const maxVal = Math.max(...values,1)

  const padL = 8
  const padR = 8
  const padT = 22
  const padB = 32

  const chartW = W - padL - padR
  const chartH = H - padT - padB

  const gap = chartW / labels.length
  const barW = Math.min(gap * 0.55,40)

  // grid
  ctx.strokeStyle = "#f1f5f9"
  ctx.lineWidth = 1

  for(let i=1;i<=3;i++){

    const y = padT + chartH - (i/3)*chartH

    ctx.beginPath()
    ctx.moveTo(padL,y)
    ctx.lineTo(W-padR,y)
    ctx.stroke()

  }

  // barras
  labels.forEach((lbl,i)=>{

    const barH = Math.max((values[i]/maxVal)*chartH,4)

    const x = padL + i*gap + gap/2 - barW/2
    const y = padT + chartH - barH

    const grad = ctx.createLinearGradient(0,y,0,y+barH)

    grad.addColorStop(0,"#3b82f6")
    grad.addColorStop(1,"#bfdbfe")

    ctx.fillStyle = grad

    ctx.beginPath()

    if(ctx.roundRect){
      ctx.roundRect(x,y,barW,barH,5)
    }else{
      ctx.rect(x,y,barW,barH)
    }

    ctx.fill()

    // valor $
    ctx.fillStyle = "#1e40af"
    ctx.font = "bold 9px JetBrains Mono, monospace"
    ctx.textAlign = "center"

    ctx.fillText("$"+values[i].toFixed(2),x+barW/2,y-5)

    // fecha limpia
    ctx.fillStyle = "#64748b"
    ctx.font = "9px Sora, sans-serif"
    ctx.textAlign = "center"

    ctx.fillText(lbl,x+barW/2,H-6)

  })

}

function showClientTicket(sale){

  const line = "--------------------------------"

  const header = `
${line}
Producto        Unit     Total
${line}
`

  const items = sale.items.map(p=>{

    const sub = p.qty * p.price

    const nameRaw = p.name + " x" + p.qty

    const name = nameRaw.length > 16
      ? nameRaw.substring(0,13) + "..."
      : nameRaw

    const nameAligned = name.padEnd(16)

    const unit = ("$" + p.price.toFixed(2)).padEnd(8)

    const total = "$" + sub.toFixed(2)

    return `${nameAligned}${unit}${total}`

  }).join("\n")

  document.getElementById("saleSummaryInfo").innerHTML =
`Venta #${sale.num}<br>
ID: ${sale.id}<br>
${sale.date}`

  document.getElementById("saleSummaryItems").innerHTML =
`<pre style="font-family:monospace;">${header}${items}
${line}</pre>`

  document.getElementById("saleSummaryTotal").innerHTML =
`<b>$${sale.total.toFixed(2)}</b>`

  document.getElementById("saleSummaryPaid").innerHTML =
`<b>$${sale.paid.toFixed(2)}</b>`

  document.getElementById("saleSummaryChange").innerHTML =
`<span style="color:#16a34a;font-weight:700;">
$${sale.change.toFixed(2)} 🟢
</span>`

  document.getElementById("saleSummary").style.display = "flex"
}

function exportCSV(){

  if(state.sales.length === 0){
    showToast("⚠ No hay ventas para exportar")
    return
  }

  let text = ""
  let acumulado = 0

  const ventas = [...state.sales].reverse()

  ventas.forEach(s => {

    acumulado += s.total

    text += `Venta #${s.num}`
    text += `${s.date}\n`

    s.items.forEach(p=>{
      text += `${p.name} x${p.qty}\n`
    })

    text += `Total: $${s.total.toFixed(2)}\n`
    text += `Pagó: $${Number(s.paid).toFixed(2)}\n`
    text += `Vuelto: $${Number(s.change).toFixed(2)}\n`
    text += `Acumulado: $${acumulado.toFixed(2)}\n`

    text += `\n------------------------------\n\n`

  })

  const blob = new Blob([text], {type:"text/plain;charset=utf-8"})

  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = `historial-ventas-${new Date().toLocaleDateString().replace(/\//g,"-")}.txt`
  a.click()

  showToast("✅ Historial descargado")

}
