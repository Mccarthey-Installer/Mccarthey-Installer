<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Mobile Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --accent: #22c55e;
    --accent2: #3b82f6;
    --dark: #0f172a;
    --sidebar-w: 260px;
  }
  
  #saleSummaryBox{
font-family: monospace;
white-space: pre;
}
  * { box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: #f1f5f9; margin: 0; }

  /* SIDEBAR */
  #sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100%;
    background: var(--dark);
    transform: translateX(calc(-1 * var(--sidebar-w)));
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    display: flex; flex-direction: column;
  }
  #sidebar.open { transform: translateX(0); }
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 99;
  }
  #overlay.show { display: block; }

  .nav-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; text-align: left;
    padding: 12px 20px; border-radius: 10px;
    color: #94a3b8; font-size: 15px; font-weight: 600;
    transition: background .2s, color .2s;
    border: none; background: transparent; cursor: pointer;
  }
  .nav-btn:hover, .nav-btn.active {
    background: rgba(255,255,255,.07); color: #fff;
  }
  .nav-btn .icon { font-size: 18px; width: 24px; text-align: center; }

  header {
    background: #fff; box-shadow: 0 1px 8px rgba(0,0,0,.08);
    padding: 14px 18px; display: flex;
    justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { font-weight: 700; font-size: 18px; color: var(--dark); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  section { padding: 18px; }

  .card {
    background: #fff; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    padding: 16px; margin-bottom: 16px;
  }

  .product-card {
    border-radius: 12px; padding: 14px;
    border: 2px solid #e2e8f0;
    transition: border-color .2s, box-shadow .2s;
    background: #fff;
  }
  .product-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(34,197,94,.15); }

  .btn-add {
    background: var(--accent); color: #fff;
    width: 100%; padding: 8px; border-radius: 8px;
    border: none; cursor: pointer; font-weight: 600; font-size: 13px;
    margin-top: 10px; transition: background .2s, transform .1s;
    font-family: 'Sora', sans-serif;
  }
  .btn-add:active { transform: scale(.96); }
  .btn-add:disabled { background: #94a3b8; cursor: not-allowed; }

  .cart-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 8px; align-items: center; padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
  }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 8px; border: 2px solid #e2e8f0;
    background: #fff; cursor: pointer; font-size: 17px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; line-height: 1;
    font-family: 'Sora', sans-serif;
  }
  .qty-btn:hover { background: #f1f5f9; }
  .qty-display {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    min-width: 28px; text-align: center; font-size: 15px;
  }

  .btn-primary {
    background: var(--accent2); color: #fff;
    padding: 12px 20px; border-radius: 10px; border: none;
    cursor: pointer; font-weight: 700; font-size: 15px;
    transition: background .2s, transform .1s; width: 100%;
    font-family: 'Sora', sans-serif;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:active { transform: scale(.98); }

  .btn-confirm {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff; padding: 14px 20px; border-radius: 12px; border: none;
    cursor: pointer; font-weight: 700; font-size: 16px;
    transition: opacity .2s, transform .1s; width: 100%;
    box-shadow: 0 4px 14px rgba(34,197,94,.3);
    font-family: 'Sora', sans-serif;
  }
  .btn-confirm:hover { opacity: .9; }
  .btn-confirm:active { transform: scale(.98); }

  .btn-danger {
    background: #ef4444; color: #fff;
    padding: 8px 14px; border-radius: 8px; border: none;
    cursor: pointer; font-weight: 600; font-size: 13px;
    transition: background .2s; font-family: 'Sora', sans-serif;
  }
  .btn-danger:hover { background: #dc2626; }

  .btn-ghost {
    background: transparent; border: 2px solid #e2e8f0; color: #475569;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 13px; transition: border-color .2s, color .2s;
    font-family: 'Sora', sans-serif;
  }
  .btn-ghost:hover { border-color: #94a3b8; color: #0f172a; }

  .input {
    border: 2px solid #e2e8f0; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; width: 100%;
    font-family: 'Sora', sans-serif; color: #0f172a;
    transition: border-color .2s; outline: none;
  }
  .input:focus { border-color: var(--accent2); }

  #modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #modal.show { display: flex; }
  #modal-box {
    background: #fff; border-radius: 20px; padding: 24px;
    width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; display: block; letter-spacing: 0.3px; text-transform: uppercase; }

  #restockModal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #restockModal.show { display: flex; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #0f172a; color: #fff; padding: 12px 22px; border-radius: 30px;
    font-weight: 600; font-size: 14px; z-index: 300;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-green { background: #dcfce7; color: #16a34a; }
  .badge-blue { background: #dbeafe; color: #2563eb; }

  .stat-card { border-radius: 12px; padding: 14px; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

  .cat-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 2px solid #e2e8f0; background: #fff; cursor: pointer; color: #475569;
    transition: all .2s; white-space: nowrap; font-family: 'Sora', sans-serif;
  }
  .cat-btn.active { background: var(--dark); border-color: var(--dark); color: #fff; }

  .cats-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .cats-scroll::-webkit-scrollbar { display: none; }

  .sec-title { font-size: 17px; font-weight: 700; color: #0f172a; }
  .cat-chip { background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }

  .inv-card {
    background: #fff; border-radius: 12px; padding: 14px;
    border: 2px solid #e2e8f0; transition: border-color .2s;
    margin-bottom: 12px;
  }
  .inv-card.best { border-color: var(--accent) !important; background: #f0fdf4; }
  .inv-card.zero { border-color: #fca5a5 !important; background: #fff8f8; }

  .sale-card { background: #fff; border-radius: 12px; padding: 16px; border: 2px solid #e2e8f0; margin-bottom: 12px; }
  .alert-box { background: #fef9c3; border: 2px solid #fde047; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; font-weight: 600; color: #854d0e; }

  .hamburger { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; transition: background .2s; }
  .hamburger:hover { background: #f1f5f9; }

  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .pop { animation: pop .2s; }
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div style="padding: 22px 20px 10px; display:flex; align-items:center; gap:10px;">
    <div style="background:var(--accent); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px;">🏪</div>
    <span style="font-weight:700; font-size:18px; color:#fff;">POS <span style="color:var(--accent);">PRO</span></span>
  </div>
  <nav style="padding:12px; flex:1; display:flex; flex-direction:column; gap:4px;">
    <button class="nav-btn active" id="nav-pos" onclick="show('pos')"><span class="icon">🛒</span>Caja</button>
    <button class="nav-btn" id="nav-inventory" onclick="show('inventory')"><span class="icon">📦</span>Inventario</button>
    <button class="nav-btn" id="nav-sales" onclick="show('sales')"><span class="icon">📋</span>Ventas</button>
    <button class="nav-btn" id="nav-stats" onclick="show('stats')"><span class="icon">📊</span>Estadísticas</button>
  </nav>
  <div style="padding:16px 20px; color:#475569; font-size:11px; font-weight:600;">POS Mobile Pro v2.0</div>
</aside>

<!-- HEADER -->
<header>
  <div style="display:flex; gap:12px; align-items:center;">
    <button class="hamburger" onclick="toggleMenu()">
      <svg width="22" height="18" viewBox="0 0 22 18" fill="none">
        <rect width="22" height="2.5" rx="1.25" fill="#0f172a"/>
        <rect y="7.75" width="22" height="2.5" rx="1.25" fill="#0f172a"/>
        <rect y="15.5" width="22" height="2.5" rx="1.25" fill="#0f172a"/>
      </svg>
    </button>
    <span class="logo">POS <span>PRO</span></span>
  </div>
  <div style="font-size:12px; font-weight:600; color:#64748b;" id="date"></div>
</header>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL PRODUCTO -->
<div id="modal">
  <div id="modal-box">
    <h3 id="modal-title" style="font-size:17px; font-weight:700; margin-bottom:20px; color:#0f172a;"></h3>
    <div style="display:flex; flex-direction:column; gap:14px;">
      <div>
        <label class="modal-label">Nombre</label>
        <input id="m-name" class="input" placeholder="Ej: Coca Cola">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div>
          <label class="modal-label">Precio venta ($)</label>
          <input id="m-price" class="input" type="number" min="0" step="0.01" placeholder="0.00">
        </div>
        <div>
          <label class="modal-label">Costo compra ($)</label>
          <input id="m-cost" class="input" type="number" min="0" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div>
          <label class="modal-label">Stock inicial</label>
          <input id="m-stock" class="input" type="number" min="0" placeholder="0">
        </div>
        <div>
          <label class="modal-label">Categoría</label>
          <input id="m-cat" class="input" placeholder="Ej: Bebidas">
        </div>
      </div>
    </div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn-ghost" onclick="closeModal()" style="flex:1;">Cancelar</button>
      <button class="btn-primary" onclick="saveProduct()" style="flex:2;">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL RESTOCK -->
<div id="restockModal">
  <div style="background:#fff; border-radius:20px; padding:24px; width:100%; max-width:340px; box-shadow:0 20px 60px rgba(0,0,0,.25); animation:slideUp .25s ease;">
    <h3 style="font-size:16px; font-weight:700; margin-bottom:16px; color:#0f172a;">📦 Agregar stock</h3>
    <p style="font-size:14px; color:#475569; margin-bottom:14px;">Producto: <b id="restock-name" style="color:var(--accent);"></b></p>
    <label class="modal-label">Cantidad a agregar</label>
    <input id="restock-qty" class="input" type="number" min="1" placeholder="Ej: 50" style="margin-bottom:16px;">
    <div style="display:flex; gap:10px;">
      <button class="btn-ghost" onclick="closeRestock()" style="flex:1;">Cancelar</button>
      <button class="btn-primary" onclick="confirmRestock()" style="flex:2;">+ Agregar</button>
    </div>
  </div>
</div>

<!-- ========== CAJA ========== -->
<section id="pos">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span class="sec-title">🛒 Productos</span>
      <input id="searchProduct" class="input" placeholder="Buscar..." style="width:150px; padding:8px 12px;">
    </div>
    <div class="cats-scroll" id="catFilter" style="margin-bottom:12px;"></div>
    <div id="lowStockAlert"></div>
    <div id="productList" class="grid grid-cols-2 gap-3"></div>
  </div>

  <div class="card">
    <span class="sec-title">🧾 Carrito</span>
    <div id="cart" style="margin-top:10px; min-height:48px;"></div>
    <div style="margin-top:12px; border-top:2px solid #f1f5f9; padding-top:14px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span style="font-weight:600; color:#64748b;">Total</span>
        <span id="total" style="font-size:26px; font-weight:700; font-family:'JetBrains Mono',monospace; color:#0f172a;">$0.00</span>
      </div>
      <input id="paid" type="number" class="input" placeholder="💵 Monto que paga el cliente..." style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#f0fdf4; border-radius:10px; margin-bottom:14px;">
        <span style="font-weight:600; color:#16a34a; font-size:14px;">Vuelto</span>
        <span id="change" style="font-weight:700; font-family:'JetBrains Mono',monospace; font-size:20px; color:#16a34a;">$0.00</span>
      </div>
      <button onclick="confirmSale()" class="btn-confirm">✅ Confirmar Venta</button>
    </div>
  </div>
</section>

<!-- ========== INVENTARIO ========== -->
<section id="inventory" class="hidden">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <span class="sec-title">📦 Inventario</span>
    <button onclick="openAddModal()" class="btn-primary" style="width:auto; padding:10px 18px;">+ Nuevo</button>
  </div>

  <input 
    id="searchInventory"
    class="input"
    placeholder="🔎 Buscar producto..."
    style="margin-bottom:16px;"
  >

  <div id="inventoryList"></div>

</section>

<!-- ========== VENTAS ========== -->
<section id="sales" class="hidden">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <span class="sec-title">📋 Historial</span>
    <div style="display:flex; gap:8px;">
      <button onclick="exportCSV()" class="btn-ghost">⬇ CSV</button>
      <button onclick="clearHistory()" class="btn-danger">Borrar</button>
    </div>
  </div>
  <div id="salesList"></div>
</section>

<!-- ========== ESTADÍSTICAS ========== -->
<section id="stats" class="hidden">

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span class="sec-title">📊 Estadísticas</span>

    <button onclick="resetStats()" class="btn-danger" style="width:auto;">
      Reiniciar
    </button>
  </div>

  <div id="statsPanel" class="grid grid-cols-2 gap-3" style="margin-top:16px;"></div>

  <div class="card" style="margin-top:4px;">
    <span style="font-weight:700; font-size:14px; color:#0f172a;">
      📈 Ventas por día
    </span>
    <canvas id="salesChart" style="margin-top:12px; width:100%; height:160px;"></canvas>
  </div>

  <div id="rankingList" class="card" style="margin-top:4px;"></div>

</section>

<script>
// =========== STATE ===========
const state = {
  products: [],
  cart: [],
  sales: []
}

let activeCategory = "Todos"
let editingId = null
let restockId = null
async function loadProducts(){

  const res = await fetch("/api/products")
  const data = await res.json()

  state.products = data.map(p => ({
    id: p.id,
    name: p.name,
    price: Number(p.price),
    cost: Number(p.cost || 0),
    stock: Number(p.stock),
    sold: Number(p.sold || 0),
    cat: p.cat || "General"
  }))

  await loadSales()

  renderAll()

}

async function loadSales(){

  try{

    const res = await fetch("/api/sales")
    const data = await res.json()

    state.sales = data || []

  }catch{

    state.sales = []

  }

}




// =========== SIDEBAR ===========
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open")
  document.getElementById("overlay").classList.toggle("show")
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open")
  document.getElementById("overlay").classList.remove("show")
}
function show(id) {
  document.querySelectorAll("section").forEach(s => s.classList.add("hidden"))
  document.getElementById(id).classList.remove("hidden")
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"))
  document.getElementById("nav-" + id)?.classList.add("active")
  closeSidebar()
  if (id === "stats") setTimeout(drawChart, 50)
}

// =========== TOAST ===========
function showToast(msg) {
  const t = document.getElementById("toast")
  t.textContent = msg
  t.classList.add("show")
  setTimeout(() => t.classList.remove("show"), 2400)
}

// =========== CATEGORIES ===========
function getCategories() {
  const cats = [...new Set(state.products.map(p => p.cat || "General"))]
  return ["Todos", ...cats]
}
function renderCategoryFilter() {
  const container = document.getElementById("catFilter")
  container.innerHTML = ""
  getCategories().forEach(cat => {
    const btn = document.createElement("button")
    btn.className = "cat-btn" + (cat === activeCategory ? " active" : "")
    btn.textContent = cat
    btn.onclick = () => { activeCategory = cat; renderProducts() }
    container.appendChild(btn)
  })
}

// =========== PRODUCTS ===========
function renderProducts() {
  const search = document.getElementById("searchProduct").value.toLowerCase()
  const container = document.getElementById("productList")
  container.innerHTML = ""
  let lowStock = []

  const filtered = state.products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search)
    const matchCat = activeCategory === "Todos" || (p.cat || "General") === activeCategory
    return matchSearch && matchCat
  })

  if (filtered.length === 0) {
    container.innerHTML = `<div style="grid-column:span 2; text-align:center; color:#94a3b8; padding:24px; font-size:13px;">Sin productos</div>`
  }

  filtered.forEach(p => {
    if (p.stock <= 5) lowStock.push(`${p.name} (${p.stock})`)
    const card = document.createElement("div")
    card.className = "product-card"
    const oos = p.stock <= 0
    card.innerHTML = `
      <div style="font-weight:700; font-size:13px; margin-bottom:4px; color:#0f172a;">${p.name}</div>
      <span class="cat-chip">${p.cat || "General"}</span>
      <div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;">
        <b style="font-size:15px; font-family:'JetBrains Mono',monospace; color:#0f172a;">$${p.price.toFixed(2)}</b>
        <span class="${p.stock <= 5 && p.stock > 0 ? 'badge badge-red' : oos ? 'badge badge-red' : 'badge badge-green'}">${p.stock}</span>
      </div>
      <button onclick="addToCart(${p.id},this)" class="btn-add" ${oos ? 'disabled' : ''}>
        ${oos ? 'Sin stock' : '+ Agregar'}
      </button>
    `
    container.appendChild(card)
  })

  const alertBox = document.getElementById("lowStockAlert")
  alertBox.innerHTML = lowStock.length
    ? `<div class="alert-box">⚠ Stock bajo: ${lowStock.join(" · ")}</div>` : ""

  renderCategoryFilter()
}

// =========== CART ===========
function addToCart(id, btn) {

  btn.classList.add("pop")
  setTimeout(() => btn.classList.remove("pop"), 220)

  let p = state.products.find(x => x.id === id)

  if (p.stock <= 0) {
    showToast("⚠ Sin stock disponible")
    return
  }

  let item = state.cart.find(x => x.id === id)

  if (item) {
    item.qty++
  } 
  else {

    state.cart.push({
      id: p.id,
      name: p.name,
      price: p.price,
      cost: p.cost,   // 🔥 NUEVO
      qty: 1
    })

  }

  p.stock--

  renderAll()
}

function changeQty(id, delta) {
  let item = state.cart.find(x => x.id === id)
  if (!item) return
  let p = state.products.find(x => x.id === id)
  if (delta > 0) {
    if (p.stock <= 0) { showToast("⚠ Sin más stock"); return }
    p.stock--
    item.qty++
  } else {
    p.stock++
    item.qty--
    if (item.qty <= 0) state.cart = state.cart.filter(x => x.id !== id)
  }
  renderAll()
}

function renderCart() {
  const container = document.getElementById("cart")
  container.innerHTML = ""
  let total = 0

  if (state.cart.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px 0; font-size:13px;">El carrito está vacío</div>`
    document.getElementById("total").textContent = "$0.00"
    calculateChange()
    return
  }

  state.cart.forEach(item => {
    const sub = item.qty * item.price
    total += sub
    const row = document.createElement("div")
    row.className = "cart-row"
    row.innerHTML = `
      <div>
        <div style="font-size:14px; font-weight:600; color:#0f172a;">${item.name}</div>
        <div style="font-size:11px; color:#94a3b8; font-family:'JetBrains Mono',monospace;">$${item.price.toFixed(2)} × ${item.qty}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-display">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <span style="font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; min-width:56px; text-align:right; color:#0f172a;">$${sub.toFixed(2)}</span>
    `
    container.appendChild(row)
  })

  document.getElementById("total").textContent = `$${total.toFixed(2)}`
  calculateChange()
}

function calculateChange() {

  const paid = Number(document.getElementById("paid").value) || 0
  const total = parseFloat(
    document.getElementById("total").textContent.replace("$","")
  ) || 0

  const change = Math.max(paid - total, 0)

  // Mostrar vuelto
  document.getElementById("change").textContent = `$${change.toFixed(2)}`

  // Botón confirmar venta
  const btn = document.querySelector(".btn-confirm")

  if (paid < total || total === 0) {
    btn.disabled = true
    btn.style.opacity = "0.5"
    btn.style.cursor = "not-allowed"
  } 
  else {
    btn.disabled = false
    btn.style.opacity = "1"
    btn.style.cursor = "pointer"
  }

}
async function confirmSale() {

  if (state.cart.length === 0) {
    showToast("⚠ El carrito está vacío")
    return
  }

  const total = parseFloat(
    document.getElementById("total").textContent.replace("$","")
  )

  const paid = Number(document.getElementById("paid").value) || 0

  if (paid < total) {
    showToast("❌ Pago insuficiente")
    return
  }

  const change = paid - total

  state.cart.forEach(item => {
    const p = state.products.find(x => x.id === item.id)
    p.sold += item.qty
  })

  const now = new Date()

  const sale = {
    id: Date.now(),
    num: state.sales.length + 1,
    date: now.toLocaleString(),
    dateKey: now.toLocaleDateString(),
    items: JSON.parse(JSON.stringify(state.cart)),
    total,
    paid,
    change
  }

  await fetch("/api/sales",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(sale)
  })

  state.cart=[]

  document.getElementById("paid").value=""

  await loadProducts()

  showToast(`✅ Venta #${sale.num}`)
  showSaleSummary(sale)
}

// =========== CHART ===========
function drawChart() {
  const canvas = document.getElementById("salesChart")
  if (!canvas) return
  const ctx = canvas.getContext("2d")
  const W = canvas.offsetWidth || 300
  canvas.width = W
  canvas.height = 160
  const H = 160

  const byDay = {}
  state.sales.forEach(s => { byDay[s.dateKey] = (byDay[s.dateKey] || 0) + s.total })
  const labels = Object.keys(byDay).slice(-7)
  const values = labels.map(k => byDay[k])

  ctx.clearRect(0, 0, W, H)

  if (labels.length === 0) {
    ctx.fillStyle = "#94a3b8"
    ctx.font = "13px Sora, sans-serif"
    ctx.textAlign = "center"
    ctx.fillText("Aún no hay datos para graficar", W/2, H/2)
    return
  }

  const maxVal = Math.max(...values, 1)
  const padL = 8, padR = 8, padT = 22, padB = 32
  const chartW = W - padL - padR
  const chartH = H - padT - padB
  const gap = chartW / labels.length
  const barW = Math.min(gap * 0.55, 40)

  // Grid
  ctx.strokeStyle = "#f1f5f9"
  ctx.lineWidth = 1
  for (let i = 1; i <= 3; i++) {
    const y = padT + chartH - (i/3) * chartH
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke()
  }

  // Bars
  labels.forEach((lbl, i) => {
    const barH = Math.max((values[i] / maxVal) * chartH, 4)
    const x = padL + i * gap + gap/2 - barW/2
    const y = padT + chartH - barH

    const grad = ctx.createLinearGradient(0, y, 0, y + barH)
    grad.addColorStop(0, "#3b82f6")
    grad.addColorStop(1, "#bfdbfe")
    ctx.fillStyle = grad
    ctx.beginPath()
    if (ctx.roundRect) ctx.roundRect(x, y, barW, barH, 5)
    else ctx.rect(x, y, barW, barH)
    ctx.fill()

    // value
    ctx.fillStyle = "#1e40af"
    ctx.font = "bold 9px JetBrains Mono, monospace"
    ctx.textAlign = "center"
    ctx.fillText("$" + values[i].toFixed(0), x + barW/2, y - 5)

    // date
    ctx.fillStyle = "#64748b"
    ctx.font = "9px Sora, sans-serif"
    ctx.textAlign = "center"
    const parts = lbl.split("/")
    ctx.fillText((parts[0]||lbl) + "/" + (parts[1]||""), x + barW/2, H - 6)
  })
}

function exportCSV(){

  ventas.forEach(s => {

    acumulado += s.total

    text += `Venta #${s.num}`
    text += `${s.date}\n`

    s.items.forEach(p=>{
      text += `${p.name} x${p.qty}\n`

    text += `Total: $${s.total.toFixed(2)}\n`
    text += `Pagó: $${Number(s.paid).toFixed(2)}\n`
    text += `Vuelto: $${Number(s.change).toFixed(2)}\n`
    text += `Acumulado: $${acumulado.toFixed(2)}\n`

    text += `\n------------------------------\n\n`

  })

  const blob = new Blob([text], {type:"text/plain;charset=utf-8"})

  a.download = `historial-ventas-${new Date().toLocaleDateString().replace(/\//g,"-")}.txt`
