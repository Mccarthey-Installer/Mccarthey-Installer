<title>POS Mobile Pro</title>

<script>

/* ─────────────────────────────────────────────────
   API — único punto de entrada.
   El backend guarda el token UUID crudo en DB y lo
   compara directamente con req.headers.authorization.
   NO usar Bearer prefix — el server no lo stripea.
───────────────────────────────────────────────── */
function api(url, options = {}) {
  const token = localStorage.getItem("token")
  return fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      "Authorization": token,
      "Content-Type": "application/json"
    }
  }).then(res => {
    if (res.status === 401) {
      localStorage.removeItem("token")
      location.href = "/login.html"
    }
    return res
  })
}

/* ─────────────────────────────────────────────────
   VERIFICAR TOKEN al cargar
───────────────────────────────────────────────── */
;(function checkToken(){
  const token = localStorage.getItem("token")
  if (!token) { location.href = "/login.html"; return }
  api("/api/session").then(res => {
    if (res.status !== 200) {
      localStorage.removeItem("token")
      location.href = "/login.html"
    }
  })
})()

/* ─────────────────────────────────────────────────
   REVISIÓN DE SESIÓN — cada 3 minutos (no 60s)
   Sin spam al servidor.
───────────────────────────────────────────────── */
setInterval(() => {
  api("/api/session").then(res => {
    if (res.status !== 200) {
      localStorage.removeItem("token")
      alert("Sesión expirada")
      location.href = "/login.html"
    }
  })
}, 3 * 60 * 1000)

/* ─────────────────────────────────────────────────
   SEARCH SUGGESTIONS (necesita state, se inicializa
   después de que el body carga)
───────────────────────────────────────────────── */
function showSuggestions(){

  const input = document.getElementById("searchProduct")
  if(!input) return

  const search = input.value.toLowerCase().trim()

  const box = document.getElementById("searchSuggestions")

  if(!search){
    box.style.display="none"
    box.innerHTML=""
    return
  }

  const results = state.products
  .filter(p => p.name.toLowerCase().includes(search))
  .slice(0,5)

  if(results.length === 0){
    box.style.display="none"
    box.innerHTML=""
    return
  }

  box.innerHTML=""

  results.forEach(p=>{

    const row = document.createElement("div")

    row.style.padding="8px 10px"
    row.style.cursor="pointer"
    row.style.display="flex"
    row.style.justifyContent="space-between"
    row.style.fontSize="13px"
    row.style.borderBottom="1px solid #f1f5f9"

    row.innerHTML = `
<span>${p.name}</span>
<b>$${p.price.toFixed(2)}</b>
`

    row.onclick = () => {
      addToCart(p.id,{classList:{add(){},remove(){}}})
      input.value=""
      box.style.display="none"
      box.innerHTML=""
      input.focus()
    }

    box.appendChild(row)

  })

  box.style.display="block"

}

/* ═══════════════════════════════════════════════
   RESPONSIVE LAYOUT — PC / TABLET / MOBILE
   Sin !important — la cascada hace el trabajo.
   Base → 640px → 860px → 1024px → 1280px → 1500px
═══════════════════════════════════════════════ */

/* ── APP SHELL ── */
#app-shell {
  display: flex;
  min-height: 100vh;
  overflow: visible;
}

/* En PC: grid real con columna reservada para sidebar */
@media (min-width: 1024px) {
  #app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
  }
}

#main-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* Sections tienen max-width para no estirarse en pantallas XL */
section {
  width: 100%;
  max-width: 1440px;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

/* ── GRID DE PRODUCTOS: auto-fit inteligente ── */
/* 140px por card → más columnas en laptop que con 180px.
   El navegador calcula: móvil 2 → tablet 3-4 → laptop 5-6 → monitor 7+ */
#productList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  grid-auto-rows: 1fr;
}

/* ────────────────────────────────────────
   580px — tablet pequeña
──────────────────────────────────────── */
@media (min-width: 580px) {
  section { padding: 20px 22px; }

  .card {
    padding: 20px;
    border-radius: 18px;
    margin-bottom: 18px;
    box-shadow: 0 3px 16px rgba(0,0,0,.07);
  }

  .product-card { padding: 16px; }
  #productList { gap: 14px; }
}

/* ────────────────────────────────────────
   860px — tablet grande
──────────────────────────────────────── */
@media (min-width: 860px) {
  section { padding: 24px 28px; }

  .card {
    padding: 24px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .product-card { padding: 18px; }
  #productList { gap: 16px; }

  /* Inventario en 2 cols */
  #inventoryList {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    align-items: start;
  }
  #inventoryList .inv-card { margin-bottom: 0; }

  /* Sales en 2 cols */
  #salesList {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    align-items: start;
  }
  #salesList .day-section-header { grid-column: 1 / -1; }

  /* Stats 3 cols */
  #statsPanel { grid-template-columns: repeat(3, 1fr); }
}

/* ────────────────────────────────────────
   1024px — laptop/desktop
   Sidebar pasa de overlay a elemento del flujo.
   Comportamiento cambia, no solo tamaño.
──────────────────────────────────────── */
@media (min-width: 1024px) {

  #sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    transform: none;
    transition: none;
    flex-shrink: 0;
    z-index: 10;
    overflow-y: auto;
  }

  #overlay { display: none; pointer-events: none; }
  .hamburger { display: none; }

  header { padding: 14px 36px; }

  section { padding: 36px 56px; }

  .card {
    padding: 34px;
    border-radius: 22px;
    margin-bottom: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,.07);
  }

  .product-card { padding: 24px; border-radius: 16px; min-height: 190px; gap: 10px; }
  .product-card .btn-add { padding: 10px; font-size: 14px; margin-top: 14px; }
  #productList { gap: 20px; }

  /* POS: productos (2fr) | carrito (1fr flexible) */
  #pos {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 28px;
    align-items: start;
  }
  #pos > .card:last-child {
    position: sticky;
    top: 84px;
  }

  /* Stats 6 cols */
  #statsPanel {
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }
  .stat-card { padding: 18px; }
  .stat-value { font-size: 24px; }

  /* Charts lado a lado */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .charts-row .card { margin-bottom: 0; }
}

/* ────────────────────────────────────────
   1280px — pantalla grande
   Más espacio para productos, carrito proporcional
──────────────────────────────────────── */
@media (min-width: 1280px) {
  section { padding: 40px 56px; }

  #productList { gap: 20px; }

  /* 3fr productos vs 1.2fr carrito */
  #pos {
    grid-template-columns: 3fr 1.2fr;
    gap: 32px;
  }

  #inventoryList {
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  #salesList {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ────────────────────────────────────────
   1400px — monitor grande
   Máxima expansión: productos dominan,
   carrito compacto, grid más agresivo.
──────────────────────────────────────── */
@media (min-width: 1400px) {
  /* minmax más pequeño → más columnas en monitor grande */
  #productList {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 22px;
  }

  /* Productos toman casi todo el ancho */
  #pos {
    grid-template-columns: 3.5fr 1fr;
    gap: 36px;
  }

  section { padding: 44px 64px; }
}

/* ────────────────────────────────────────
   DETALLES PRO: hover fino, sombras
──────────────────────────────────────── */

.btn-add:hover { background: #16a34a; }

.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,.35); }

.btn-ghost:hover { border-color: #64748b; color: #0f172a; background: #f8fafc; }


/* Input con glow más elegante */
.input:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(59,130,246,.12);
}

/* Stat cards con hover */
.stat-card {
  transition: transform .2s, box-shadow .2s;
  cursor: default;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.1);
}

/* Inv card con hover */
.inv-card:hover {
  border-color: #94a3b8;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.inv-card.best:hover { border-color: var(--accent); }

/* Nav btn con transición en sidebar */
.nav-btn { transition: background .15s, color .15s, padding-left .2s; }
.nav-btn:hover { padding-left: 18px; }
.nav-btn.active { padding-left: 18px; }

</style>

<script>


// ═══════════════════════════════════════════════════════════
//  STORE — único punto de mutación del estado
//
//  Reglas:
//   1. Nadie toca state directamente — solo store.commit()
//   2. Cada mutación queda en store.history (últimas 50)
//   3. store.rollback() revierte la última mutación
//   4. En dev (localhost) el state expuesto es un Proxy
//      que grita en consola si alguien intenta escribir directo
// ═══════════════════════════════════════════════════════════

const store = (() => {

  const _state = {
    products: [],
    cart:     [],
    sales:    []
  }

  // Historial de mutaciones — deep clone real con structuredClone
  const _history = []
  const MAX_HISTORY = 50

  // Suscriptores — se notifican automáticamente después de cada commit
  const _listeners = []

  function subscribe(fn) {
    _listeners.push(fn)
    // Devuelve unsubscribe
    return () => {
      const i = _listeners.indexOf(fn)
      if (i > -1) _listeners.splice(i, 1)
    }
  }

  function _notify() {
    const snapshot = {
      products: _state.products.slice(),
      cart:     _state.cart.slice(),
      sales:    _state.sales.slice()
    }
    _listeners.forEach(fn => {
      try { fn(snapshot) } catch(e) { console.error("[Store] Error en suscriptor:", e) }
    })
  }

  const _mutations = {

    SET_PRODUCTS(state, products) {
      return { products: products.map(p => Object.freeze({ ...p })) }
    },

    SET_SALES(state, sales) {
      return { sales: [...sales] }
    },

    PREPEND_SALE(state, sale) {
      return { sales: [sale, ...state.sales] }
    },

    CLEAR_SALES(state) {
      return { sales: [] }
    },

    SET_CART(state, cart) {
      return { cart: [...cart] }
    },

    CLEAR_CART(state) {
      return { cart: [] }
    },

    CART_ADD(state, product) {
      const existing = state.cart.find(x => x.id === product.id)
      if (existing) {
        return {
          cart: state.cart.map(x =>
            x.id === product.id ? { ...x, qty: x.qty + 1 } : x
          )
        }
      }
      return {
        cart: [...state.cart, { ...product, qty: 1 }]
      }
    },

    CART_CHANGE_QTY(state, { id, delta }) {
      const item = state.cart.find(x => x.id === id)
      if (!item) return {}
      const newQty = item.qty + delta
      if (newQty <= 0) {
        return { cart: state.cart.filter(x => x.id !== id) }
      }
      return {
        cart: state.cart.map(x =>
          x.id === id ? { ...x, qty: newQty } : x
        )
      }
    },

    CART_CLAMP(state, { id, max }) {
      return {
        cart: state.cart.map(x =>
          x.id === id ? { ...x, qty: Math.min(x.qty, max) } : x
        ).filter(x => x.qty > 0)
      }
    },

    CART_REMOVE(state, id) {
      return { cart: state.cart.filter(x => x.id !== id) }
    }

  }

  function commit(type, payload) {
    if (!_mutations[type]) {
      console.error(`[Store] Mutación desconocida: "${type}"`)
      return
    }

    // Deep clone real antes de mutar — historial confiable
    const snapshot = structuredClone(_state)

    const patch = _mutations[type](_state, payload)
    Object.assign(_state, patch)

    _history.push({ type, payload, snapshot, ts: Date.now() })
    if (_history.length > MAX_HISTORY) _history.shift()

    if (window.__POS_DEV__) {
      console.log(`[Store ✔] ${type}`, payload ?? "", "→", { ..._state })
    }

    // Notificar suscriptores automáticamente — sin markDirty manual
    _notify()
  }

  function rollback() {
    const last = _history.pop()
    if (!last) { console.warn("[Store] Nada que revertir"); return }
    Object.assign(_state, last.snapshot)
    console.warn(`[Store ↩] Rollback de ${last.type}`)
    _notify()
  }

  function get() {
    return {
      products: _state.products.slice(),
      cart:     _state.cart.slice(),
      sales:    _state.sales.slice()
    }
  }

  function getProducts() { return _state.products.slice() }
  function getCart()     { return _state.cart.slice() }
  function getSales()    { return _state.sales.slice() }
  function getHistory()  { return _history.slice() }

  const _devProxy = typeof Proxy !== "undefined"
    ? new Proxy(_state, {
        set(target, key, value) {
          console.error(
            `[Store] ⚠ Mutación directa bloqueada: state.${String(key)} = ...`,
            "\nUsá store.commit() en su lugar."
          )
          return false
        }
      })
    : _state

  if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
    window.__POS_DEV__ = true
    window.state = _devProxy
    window.store = { commit, rollback, get, getHistory, subscribe }
    console.info("[Store] 🛡 Modo dev activo — mutaciones directas bloqueadas.")
  }

  return { commit, rollback, get, getProducts, getCart, getSales, getHistory, subscribe }

})()

// Alias de lectura — el resto del código lee de acá sin cambios
// IMPORTANTE: solo lectura. Mutaciones → store.commit()
const state = {
  get products() { return store.getProducts() },
  get cart()     { return store.getCart() },
  get sales()    { return store.getSales() }
}


// =========== RENDER REACTIVO ===========
// El store avisa solo. No más markDirty/flushRender manual.
// Cada commit → _notify() → este suscriptor decide qué renderizar.

let _prevState = { products: [], cart: [], sales: [] }

store.subscribe(function(next) {
  const productsChanged = next.products !== _prevState.products
  const cartChanged     = next.cart     !== _prevState.cart
  const salesChanged    = next.sales    !== _prevState.sales

  if (productsChanged || cartChanged) {
    renderCategoryFilter()
    renderProducts()
  }
  if (cartChanged) {
    renderCart()
  }
  if (productsChanged || salesChanged) {
    renderInventory()
    renderStats()
    renderSales()
  }

  _prevState = next
})

// Compat: flushRender y markDirty ya no hacen nada — el store notifica solo.
// Se mantienen como no-ops para no romper llamadas existentes durante la transición.
function markDirty() {}
function flushRender() {}

// =========== LOCKS ===========
let lock = false
let syncing = false
let loadingProducts = false
let lastSyncTime = null

// ── ACTIVITY TRACKER ──
let lastUserActivity = Date.now()

function trackActivity() {
  lastUserActivity = Date.now()
}

document.addEventListener("DOMContentLoaded", () => {
  const activityTargets = ["paid", "searchProduct", "searchInventory", "searchSales"]
  activityTargets.forEach(id => {
    document.getElementById(id)?.addEventListener("input", trackActivity)
    document.getElementById(id)?.addEventListener("focus", trackActivity)
  })
  document.addEventListener("click", trackActivity)
})

function userIsActive() {
  return (Date.now() - lastUserActivity) < 3000
}

function setSyncStatus(status, msg) {
  const el = document.getElementById("syncIndicator")
  const dot = document.getElementById("syncDot")
  const text = document.getElementById("syncText")
  el.className = ""
  el.classList.add(status)
  text.textContent = msg
  if (status === "syncing") dot.innerHTML = '<span class="spin">🔄</span>'
  else if (status === "ok") dot.textContent = "🟢"
  else dot.textContent = "🔴"
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(state.cart))
}

function loadCart(){
  const saved = localStorage.getItem("cart")
  if(saved){
    try {
      store.commit("SET_CART", JSON.parse(saved))
    } catch {
      store.commit("CLEAR_CART")
    }
  }
}

let activeCategory = "Todos"
let editingId = null
let restockId = null

// =========== FORMATEAR FECHA ===========
function formatDate(str){
  if(!str) return ""
  const d = new Date(str)
  if(isNaN(d.getTime())) return str
  const day = d.getDate()
  const month = d.getMonth()+1
  const year = d.getFullYear()
  let hours = d.getHours()
  const minutes = String(d.getMinutes()).padStart(2,"0")
  const ampm = hours >= 12 ? "pm" : "am"
  hours = hours % 12
  if(hours === 0) hours = 12
  return `${day}/${month}/${year}, ${hours}:${minutes} ${ampm}`
}

function getDateKey(str){
  if(!str) return null
  const d = new Date(str)
  if(!isNaN(d.getTime())){
    return d.getDate() + "/" + (d.getMonth() + 1)
  }
  return str.split("/").slice(0,2).join("/")
}

function getDayLabel(dateStr){
  const d = new Date(dateStr)
  if(isNaN(d.getTime())) return "Antiguas"
  const hoy = new Date()
  const ayer = new Date(); ayer.setDate(hoy.getDate() - 1)
  const toKey = x => x.getFullYear() + "-" + x.getMonth() + "-" + x.getDate()
  if(toKey(d) === toKey(hoy))   return "Hoy"
  if(toKey(d) === toKey(ayer))  return "Ayer"
  const hace7 = new Date(); hace7.setDate(hoy.getDate() - 7)
  if(d >= hace7) return "Esta semana"
  if(d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear())
    return "Este mes"
  return "Más antiguas"
}

// =========== HELPER: label seguro para num ===========
function saleNumLabel(num){
  return (num != null && num !== "" && !isNaN(Number(num)))
    ? "#" + Number(num)
    : "(sin número)"
}

// =========== LOAD PRODUCTS ===========
async function loadProducts(force = false){

  if(lock) return
  if(syncing) return

  syncing = true
  loadingProducts = true

  setSyncStatus("syncing", "Sincronizando...")

  try {

    const res = await api("/api/products")
    if(!res.ok) throw new Error("HTTP " + res.status)
    const data = await res.json()

    if(lock) return

    // Validación básica — datos corruptos del backend no pasan
    if (!Array.isArray(data)) throw new Error("Respuesta inesperada del servidor")
    const validData = data.filter(p => {
      if (!p.id || !p.name) {
        console.warn("[loadProducts] Producto inválido ignorado:", p)
        return false
      }
      return true
    })

    const prodChanged = force || validData.length !== state.products.length || validData.some(p => {
      const old = state.products.find(x => x.id === p.id)
      return !old
        || Number(p.stock) !== old.stock
        || Number(p.sold)  !== old.sold
        || Number(p.price) !== old.price
    })

    store.commit("SET_PRODUCTS", validData.map(p => ({
      id: p.id,
      name: p.name,
      price: Number(p.price),
      cost: Number(p.cost || 0),
      stock: Number(p.stock),
      sold: Number(p.sold || 0),
      cat: p.cat || "General"
    })))

    // Ajustar carrito según stock actualizado
    const cartBefore = state.cart.length
    const itemsDropped = []
    const cartActual = state.cart

    const cartFiltrado = cartActual.filter(item => {
      const p = state.products.find(x => x.id === item.id)
      if(!p || p.stock <= 0){
        itemsDropped.push(`${item.name} (sin stock)`)
        return false
      }
      return true
    }).map(item => {
      const p = state.products.find(x => x.id === item.id)
      if(p.stock < item.qty){
        itemsDropped.push(`${item.name} (ajustado a ${p.stock})`)
        return { ...item, qty: p.stock }
      }
      return item
    })

    store.commit("SET_CART", cartFiltrado)
    const cartChanged = cartFiltrado.length !== cartBefore

    if(itemsDropped.length > 0){
      setTimeout(()=>{
        showToast(`⚠ Carrito ajustado: ${itemsDropped.join(", ")}`)
      }, 400)
    }

    if(prodChanged) markDirty("products")
    if(cartChanged) markDirty("cart")

    if(prodChanged || cartChanged){
      flushRender()
    }

    lastSyncTime = new Date()
    setSyncStatus("ok", "Sincronizado " + lastSyncTime.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}))

  } catch(err) {

    console.error("Error cargando productos:", err)
    setSyncStatus("error", "Sin conexión")

  } finally {

    syncing = false
    loadingProducts = false

  }

}

async function backupPOS(){

  const res = await api("/api/backup")
  const data = await res.json()

  const blob = new Blob(
    [JSON.stringify(data,null,2)],
    {type:"application/json"}
  )

  const now = new Date()

  const fecha =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") + "_" +
    String(now.getHours()).padStart(2,"0") + "-" +
    String(now.getMinutes()).padStart(2,"0") + "-" +
    String(now.getSeconds()).padStart(2,"0")

  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = "pos-backup_" + fecha + ".json"
  a.click()

  showToast("✅ Backup descargado")

}

async function restorePOS(file){

  if(!file) return

  const text = await file.text()
  const data = JSON.parse(text)

  await api("/api/restore",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  })

  showToast("♻️ Backup restaurado")

  setTimeout(()=>{ location.reload() },1000)

}

async function loadSales(){

  try{

    const res = await api("/api/sales")
    const data = await res.json()

    store.commit("SET_SALES", (data || []).map(s => {
      let d = new Date(s.date)
      if(isNaN(d.getTime()) && typeof s.date === "string"){
        const parts = s.date.split(",")
        if(parts.length){
          const fecha = parts[0].trim().split("/")
          if(fecha.length === 3){
            d = new Date(fecha[2], fecha[1]-1, fecha[0])
          }
        }
      }
      return { ...s, date: d.toISOString() }
    }))

  }catch{

    store.commit("CLEAR_SALES")

  }

}

// =========== PRODUCTS ===========
function renderProducts() {
  const search = document.getElementById("searchProduct").value.toLowerCase()
  const container = document.getElementById("productList")
  container.innerHTML = ""
  let lowStock = []

  const filtered = state.products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search)
    const matchCat = activeCategory === "Todos" || (p.cat || "General") === activeCategory
    return matchSearch && matchCat
  })

  if (filtered.length === 0) {
    container.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#94a3b8; padding:24px; font-size:13px;">Sin productos</div>`
  }

  filtered.forEach(p => {
    if (p.stock <= 5) lowStock.push(`${p.name} (${p.stock})`)

    const inCart = state.cart.find(x => x.id === p.id)
    const qtyInCart = inCart ? inCart.qty : 0
    const available = p.stock - qtyInCart
    const oos = available <= 0

    const card = document.createElement("div")
    card.className = "product-card"
    card.innerHTML = `
      <div class="product-name">${p.name}</div>
      <span class="cat-chip">${p.cat || "General"}</span>
      <div style="margin-top:auto; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
        <span class="product-price">$${p.price.toFixed(2)}</span>
        <span class="${p.stock <= 5 && p.stock > 0 ? 'badge badge-red' : p.stock <= 0 ? 'badge badge-red' : 'badge badge-green'}">${p.stock}</span>
      </div>
      <button onclick="addToCart(${p.id},this)" class="btn-add" ${oos ? 'disabled' : ''}>
        ${oos ? 'Sin stock' : '+ Agregar'}
      </button>
    `
    container.appendChild(card)
  })

  const alertBox = document.getElementById("lowStockAlert")
  alertBox.innerHTML = lowStock.length
    ? `<div class="alert-box">⚠ Stock bajo: ${lowStock.join(" · ")}</div>` : ""

  renderCategoryFilter()
}

// =========== CART ===========
function addToCart(id, btn) {

  btn.classList.add("pop")
  setTimeout(() => btn.classList.remove("pop"), 220)

  const p = state.products.find(x => x.id === id)
  const item = state.cart.find(x => x.id === id)
  const currentQty = item ? item.qty : 0

  if (currentQty >= p.stock) {
    showToast("⚠ No hay suficiente stock")
    return
  }

  store.commit("CART_ADD", {
    id: p.id, name: p.name, price: p.price, cost: p.cost
  })

  markDirty("cart", "products")
  flushRender()
  saveCart()
}

function changeQty(id, delta) {
  const item = state.cart.find(x => x.id === id)
  if (!item) return
  const p = state.products.find(x => x.id === id)

  if (delta > 0 && item.qty >= p.stock) {
    showToast("⚠ Sin más stock")
    return
  }

  store.commit("CART_CHANGE_QTY", { id, delta })

  markDirty("cart", "products")
  flushRender()
  saveCart()
}

function calculateChange() {
  const paid = Number(document.getElementById("paid").value) || 0
  const total = state.cart.reduce((a, item) => a + item.price * item.qty, 0)
  const change = Math.max(paid - total, 0)
  document.getElementById("change").textContent = `$${change.toFixed(2)}`

  const btn = document.querySelector("#confirmSaleBtn")

  if (paid < total || total === 0) {
    btn.disabled = true
    btn.style.opacity = "0.5"
    btn.style.cursor = "not-allowed"
  } else {
    btn.disabled = false
    btn.style.opacity = "1"
    btn.style.cursor = "pointer"
  }
}

function renderCart() {
  const container = document.getElementById("cart")
  container.innerHTML = ""

  if (state.cart.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px 0; font-size:13px;">El carrito está vacío</div>`
    document.getElementById("total").textContent = "$0.00"
    calculateChange()
    return
  }

  let total = 0

  state.cart.forEach(item => {
    const sub = item.qty * item.price
    total += sub
    const row = document.createElement("div")
    row.className = "cart-row"
    row.innerHTML = `
      <div>
        <div style="font-size:14px; font-weight:600; color:#0f172a;">${item.name}</div>
        <div style="font-size:11px; color:#94a3b8; font-family:'JetBrains Mono',monospace;">$${item.price.toFixed(2)} × ${item.qty}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-display">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <span style="font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; min-width:56px; text-align:right; color:#0f172a;">$${sub.toFixed(2)}</span>
    `
    container.appendChild(row)
  })

  document.getElementById("total").textContent = `$${total.toFixed(2)}`
  calculateChange()
}

// =========== CONFIRMAR VENTA ===========
async function confirmSale() {

  if(lock) {
    showToast("⏳ Procesando venta...")
    return
  }

  if (state.cart.length === 0) {
    showToast("⚠ El carrito está vacío")
    return
  }

  const total = state.cart.reduce((a, item) => a + item.price * item.qty, 0)
  const paid = Number(document.getElementById("paid").value) || 0

  if (paid < total) {
    showToast("❌ Pago insuficiente")
    return
  }

  const btn = document.getElementById("confirmSaleBtn")

  lock = true
  btn.disabled = true
  btn.style.opacity = "0.6"
  btn.textContent = "⏳ Procesando..."

  try {

    setSyncStatus("syncing", "Verificando stock...")
    try {
      const res = await api("/api/products")
      if(res.ok){
        const data = await res.json()
        store.commit("SET_PRODUCTS", data.map(p => ({
          id: p.id,
          name: p.name,
          price: Number(p.price),
          cost: Number(p.cost || 0),
          stock: Number(p.stock),
          sold: Number(p.sold || 0),
          cat: p.cat || "General"
        })))
        lastSyncTime = new Date()
        setSyncStatus("ok", "Stock verificado")
      }
    } catch(e) {
      console.warn("No se pudo verificar stock antes de venta:", e)
      setSyncStatus("error", "Sin conexión")
    }

    for (const item of state.cart){
      const p = state.products.find(x => x.id === item.id)
      if(!p){
        showToast(`❌ Producto no existe: ${item.name}`)
        return
      }
      if(p.stock < item.qty){
        showToast(`❌ Sin stock: ${item.name} (disponible: ${p.stock})`)
        store.commit("CART_CLAMP", { id: item.id, max: p.stock })
        markDirty("cart", "products")
        flushRender()
        return
      }
    }

    const finalTotal = state.cart.reduce((a, item) => a + item.price * item.qty, 0)

    const now = new Date()

    const sale = {
      id: null,
      num: null,
      date: now.toISOString(),
      dateKey: now.getDate() + "/" + (now.getMonth()+1),
      items: JSON.parse(JSON.stringify(state.cart)),
      total: finalTotal,
      paid,
      change: paid - finalTotal
    }

    const res = await api("/api/sales",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(sale)
    })

    const data = await res.json()

    if(!res.ok){
      showToast(data.error || "❌ Error en venta")
      return
    }

    sale.id  = data.id
    sale.num = data.num != null ? Number(data.num) : null

    if(sale.num == null){
      console.warn("⚠ El backend no devolvió num.")
    }

    store.commit("PREPEND_SALE", sale)
    store.commit("CLEAR_CART")
    localStorage.removeItem("cart")
    document.getElementById("paid").value = ""
    if (document.activeElement) document.activeElement.blur()

    markDirty("cart", "products")
    flushRender()

    showSaleSummary(sale)
    showToast(`✅ Venta ${saleNumLabel(sale.num)} realizada`)

  } catch (err) {

    console.error(err)
    showToast("❌ Error inesperado al procesar la venta")

  } finally {

    lock = false
    btn.disabled = false
    btn.style.opacity = "1"
    btn.textContent = "✅ Confirmar Venta"
    calculateChange()

  }

}

Producto              Unit     Total
${line}

    ...sale.items.map(p => (p.name + " x" + p.qty).length),

function filtrarVentas(ventas, texto){
  const palabras = texto.toLowerCase().split(" ").filter(p => p.trim() !== "")
  if(palabras.length === 0) return ventas
  return ventas.filter(sale => {
    const nombres = sale.items.map(i => i.name.toLowerCase())
    return palabras.every(p => nombres.some(n => n.includes(p)))
  })
}

function renderSales(){

  const container = document.getElementById("salesList")
  container.innerHTML = ""

  const search = document.getElementById("searchSales")?.value?.toLowerCase() || ""

  const filtradas = filtrarVentas(state.sales, search)

  if(filtradas.length === 0){
    const msg = search
      ? "No se encontraron coincidencias"
      : "No hay ventas registradas aún"
    container.innerHTML = `<div style="text-align:center;color:#94a3b8;padding:40px 0;">${msg}</div>`
    return
  }

  const ventasOrdenadas = filtradas
    .slice()
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 50)

  const totalGeneral = ventasOrdenadas.reduce((a, s) => a + s.total, 0)
  let acumuladoRestante = totalGeneral

  const ventasConAcumulado = ventasOrdenadas.map(s => {
    const acumulado = acumuladoRestante
    acumuladoRestante -= s.total
    return { ...s, acumulado }
  })

  const ORDEN_SECCIONES = ["Hoy", "Ayer", "Esta semana", "Este mes", "Más antiguas"]

  const grupos = {}
  ventasConAcumulado.forEach(s => {
    const label = getDayLabel(s.date)
    if(!grupos[label]) grupos[label] = []
    grupos[label].push(s)
  })

  const colors = ["#dbeafe","#dcfce7","#fef9c3","#fee2e2","#e0f2fe"]

  ORDEN_SECCIONES.forEach(seccion => {

    const ventas = grupos[seccion]

    const header = document.createElement("div")

          <br>Valor unitario: <b>$${p.price.toFixed(2)} c/u</b>
          <br>${icon} Ganancia unidad: <b style="color:#16a34a;font-size:14px;">$${unitProfit.toFixed(2)} c/u</b>
          <br><br>
        `
      }).join("")

      const profitVenta = s.items.reduce((a,p)=>{
        return a + ((p.price - p.cost) * p.qty)
      },0)

      const div = document.createElement("div")
      div.style.background = colors[i % colors.length]
      div.style.borderRadius = "14px"
      div.style.padding = "16px"
      div.style.marginBottom = "14px"
      div.style.boxShadow = "0 2px 8px rgba(0,0,0,.08)"

      div.innerHTML = `
        <div style="font-weight:700;font-size:15px;margin-bottom:4px;">Venta ${saleNumLabel(s.num)}</div>
        <div style="font-size:11px;color:#64748b;margin-bottom:6px;">ID: ${s.id}</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:10px;">${formatDate(s.date)}</div>
        <div style="line-height:1.7;margin-bottom:12px;font-weight:600;">${items}</div>
        <div style="font-size:13px;line-height:1.8;">
          Total: <b>$${s.total.toFixed(2)}</b><br>

          Pagó: <b>$${Number(s.paid).toFixed(2)}</b><br>
          Vuelto: <b>$${Number(s.change).toFixed(2)}</b><br>
          <span style="font-weight:700;">Acumulado: $${s.acumulado.toFixed(2)}</span>
        </div>
        <div style="margin-top:10px;">
          <button class="btn-ghost" style="width:100%;">📄 Ver ticket</button>
        </div>
      `

      const btn = div.querySelector("button")
      btn.onclick = () => showSaleSummary(s)

      container.appendChild(div)

    })

  })

}

// =========== CHART ===========
function drawChart() {

  const canvas = document.getElementById("salesChart")
  if (!canvas) return

  const ctx = canvas.getContext("2d")
  const W = canvas.offsetWidth || 300
  canvas.width = W
  canvas.height = 160
  const H = 160

  const byDay = {}

  state.sales.forEach(s => {
    const key = getDateKey(s.date)
    if(!key) return
    byDay[key] = (byDay[key] || 0) + s.total
  })

  const labels = Object.keys(byDay)
    .sort((a,b)=>{
      const [d1,m1] = a.split("/").map(Number)
      const [d2,m2] = b.split("/").map(Number)
      return new Date(2026,m1-1,d1) - new Date(2026,m2-1,d2)
    })
    .slice(-7)

  const values = labels.map(k => byDay[k])

  ctx.clearRect(0,0,W,H)

  if(labels.length === 0){
    ctx.fillStyle = "#94a3b8"
    ctx.font = "13px Sora, sans-serif"
    ctx.textAlign = "center"
    ctx.fillText("Aún no hay datos para graficar",W/2,H/2)
    return
  }

  const maxVal = Math.max(...values,1)
  const padL = 8, padR = 8, padT = 22, padB = 32
  const chartW = W - padL - padR
  const chartH = H - padT - padB
  const gap = chartW / labels.length
  const barW = Math.min(gap * 0.55,40)

  ctx.strokeStyle = "#f1f5f9"
  ctx.lineWidth = 1
  for(let i=1;i<=3;i++){
    const y = padT + chartH - (i/3)*chartH
    ctx.beginPath()
    ctx.moveTo(padL,y)
    ctx.lineTo(W-padR,y)
    ctx.stroke()
  }

  labels.forEach((lbl,i)=>{
    const barH = Math.max((values[i]/maxVal)*chartH,4)
    const x = padL + i*gap + gap/2 - barW/2
    const y = padT + chartH - barH

    const grad = ctx.createLinearGradient(0,y,0,y+barH)
    grad.addColorStop(0,"#3b82f6")
    grad.addColorStop(1,"#bfdbfe")
    ctx.fillStyle = grad
    ctx.beginPath()
    if(ctx.roundRect){ ctx.roundRect(x,y,barW,barH,5) }
    else { ctx.rect(x,y,barW,barH) }
    ctx.fill()

    ctx.fillStyle = "#1e40af"
    ctx.font = "bold 9px JetBrains Mono, monospace"
    ctx.textAlign = "center"
    ctx.fillText("$"+values[i].toFixed(2),x+barW/2,y-5)

    ctx.fillStyle = "#64748b"
    ctx.font = "9px Sora, sans-serif"
    ctx.textAlign = "center"
    ctx.fillText(lbl,x+barW/2,H-6)
  })
}

function drawProfitChart(){

  const canvas = document.getElementById("profitChart")
  if(!canvas) return

  const ctx = canvas.getContext("2d")
  const W = canvas.offsetWidth || 300
  canvas.width = W
  canvas.height = 160
  const H = 160

  const byDay = {}

  state.sales.forEach(s=>{
    const key = getDateKey(s.date)
    if(!key) return
    let profit = 0
    s.items.forEach(p=>{ profit += (p.price - p.cost) * p.qty })
    byDay[key] = (byDay[key] || 0) + profit
  })

  const labels = Object.keys(byDay)
    .sort((a,b)=>{
      const [d1,m1] = a.split("/").map(Number)
      const [d2,m2] = b.split("/").map(Number)
      return new Date(2026,m1-1,d1) - new Date(2026,m2-1,d2)
    })
    .slice(-7)

  const values = labels.map(k=>byDay[k])

  ctx.clearRect(0,0,W,H)

  if(labels.length===0){
    ctx.fillStyle="#94a3b8"
    ctx.font="13px Sora"
    ctx.textAlign="center"
    ctx.fillText("Sin datos",W/2,H/2)
    return
  }

  const maxVal = Math.max(...values,1)
  const padL=8,padR=8,padT=22,padB=32
  const chartW=W-padL-padR
  const chartH=H-padT-padB
  const gap=chartW/labels.length
  const barW=Math.min(gap*0.55,40)

  labels.forEach((lbl,i)=>{
    const barH=(values[i]/maxVal)*chartH
    const x=padL+i*gap+gap/2-barW/2
    const y=padT+chartH-barH
    ctx.fillStyle="#22c55e"
    ctx.fillRect(x,y,barW,barH)
    ctx.fillStyle="#166534"
    ctx.font="bold 9px JetBrains Mono"
    ctx.textAlign="center"
    ctx.fillText("$"+values[i].toFixed(2),x+barW/2,y-5)
    ctx.fillStyle="#64748b"
    ctx.font="9px Sora"
    ctx.fillText(lbl,x+barW/2,H-6)
  })
}

// =========== EXPORT CSV ===========
function exportCSV(){

  if(state.sales.length === 0){
    showToast("⚠ No hay ventas")
    return
  }

  let text = ""
  const ventas = state.sales.slice().sort((a,b) => new Date(b.date) - new Date(a.date))
  let acumulado = ventas.reduce((a,b)=> a + b.total, 0)

  ventas.forEach(s => {
    text += `Venta ${saleNumLabel(s.num)}\n`
    text += `ID: ${s.id}\n`
    text += `${formatDate(s.date)}\n\n`

    s.items.forEach(p => {
      const unitProfit = (p.price - p.cost)
      const totalProfit = unitProfit * p.qty
      text += `• ${p.name} x${p.qty}\n`
      text += `  Precio: $${p.price.toFixed(2)}\n`
      text += `  Costo: $${p.cost.toFixed(2)}\n`
      text += `  Ganancia/u: $${unitProfit.toFixed(2)}\n`
      text += `  Ganancia total: $${totalProfit.toFixed(2)}\n\n`
    })

    const profitVenta = s.items.reduce((a,p)=>{ return a + ((p.price - p.cost) * p.qty) },0)

    text += `Total: $${s.total.toFixed(2)}\n`
    text += `Ganancia: $${profitVenta.toFixed(2)}\n`
    text += `Pagó: $${Number(s.paid).toFixed(2)}\n`
    text += `Vuelto: $${Number(s.change).toFixed(2)}\n`
    text += `Acumulado: $${acumulado.toFixed(2)}\n`

    acumulado -= s.total
    text += `\n--------------------------------\n\n`
  })

  const blob = new Blob(["\uFEFF" + text],{type:"text/plain;charset=utf-8"})
  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)

  const now = new Date()
  const fecha = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0")
  const hora = String(now.getHours()).padStart(2,"0") + "-" + String(now.getMinutes()).padStart(2,"0") + "-" + String(now.getSeconds()).padStart(2,"0")

  a.download = `historial-${fecha}_${hora}.txt`
  a.click()

  showToast("✅ Historial completo descargado")
}

// =========== INIT ===========
async function init(){

  await loadProducts()
  await loadSales()

  loadCart()

  const itemsAjustados = []
  const cartActual = store.getCart()

  const cartFiltrado = cartActual.filter(item => {
    const p = store.getProducts().find(x => x.id === item.id)
    if(!p || p.stock <= 0){
      itemsAjustados.push(`${item.name} (sin stock)`)
      return false
    }
    if(p.stock < item.qty){
      itemsAjustados.push(`${item.name} (ajustado a ${p.stock})`)
      item = { ...item, qty: p.stock }
    }
    return true
  })

  if(cartFiltrado.length !== cartActual.length) {
    store.commit("SET_CART", cartFiltrado)
  }

  if(itemsAjustados.length > 0){
    setTimeout(()=>{
      showToast(`⚠ Carrito ajustado: ${itemsAjustados.join(", ")}`)
    }, 800)
  }

  markDirty("cart", "sales")
  flushRender()

  show("pos")

}

init()
